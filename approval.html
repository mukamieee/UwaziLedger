<!DOCTYPE html>
<html>
    <head> 
        <!-- in the heading on the browser Tab -->
        <title> UwaziLedger | Auditor Vault </title>
 
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            body {
                background-color: #f4f7f6;
                padding: 20px;
            }
            /* 3. Header Styling */
            header {
            background-color: #1a252f;
            color: white;
            padding: 1.5rem 2rem;
            text-align: center;
            }

            header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #3498db;
            }

            /* 4. Main Container Styling */
        main {
            max-width: 1000px;
            margin: 2rem auto; /* Centers the container */
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        main h2 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        main p {
            color: #7f8c8d;
            margin-bottom: 1.5rem;
        }
        /* 5. The Table Styling */
        table {
            width: 100%;
            border-collapse: collapse; /* Removes ugly double borders */
            text-align: left;
        }

        th, td {
            padding: 1rem;
            border-bottom: 1px solid #ecf0f1;
        }

        th {
            background-color: #f8f9fa;
            color: #34495e;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #3498db;
            color: white;
        }
        </style>
    </head>
    <body>
        
        <header>
        <h1>UwaziLedger Compliance</h1>
        <p>Role: Auditor (Checker)</p>
        <br>
        <a href="login.html" style="color: #e74c3c; text-decoration: none; font-weight: bold;">[ Secure Logout ]</a>
         </header>

        <main>
            <section>
                <h2> Pending Transactions for Review</h2>
                <p> Please verify the following transactions before approval</p>

                <table>
                    <thead>
                    <tr>
                        <th>Date Submitted</th>
                        <th>Maker (Clerk)</th>
                        <th>Category</th>
                        <th>Amount (KES)</th>
                        <th>Evidence</th>
                        <th>Action</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr>
                        <td>2024-06-01</td>
                        <td>Jane Doe</td>
                        <td>Campaign Event</td>
                        <td>150,000</td>
                        <td><a href="#">View Receipt</a></td>
                        <td>
                            <button onclick="alert('Transaction Approved!')">Approve</button>
                            <button onclick="alert('Transaction Rejected!')">Reject</button>
                        </td>
                    </tbody>

                </table>
            </section>
        </main>
    </body>
</html>
